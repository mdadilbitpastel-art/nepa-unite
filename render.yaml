# Render Blueprint — Django web service.
# Link this repo in the Render dashboard ("New +" → "Blueprint") and Render
# reads this file. Secrets marked `sync: false` must be filled in the dashboard.
#
# NOTE: No managed Postgres is created here (a Render account may only have ONE
# free Postgres). Use an EXTERNAL Postgres (e.g. Neon / Supabase free tier) and
# paste its connection string into DATABASE_URL in the dashboard after sync.

services:
  - type: web
    name: nepa-unite
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: "./build.sh"
    startCommand: "gunicorn nepa_unite.wsgi:application"
    healthCheckPath: /api/health/
    envVars:
      # --- Core Django ---
      - key: DJANGO_SETTINGS_MODULE
        value: nepa_unite.settings.production
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DJANGO_SECRET_KEY
        generateValue: true          # Render generates a strong secret
      - key: DJANGO_DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: "4"                    # gunicorn worker count

      # --- Database ---
      # Reuses an EXISTING Render Postgres (shared with another service).
      # Paste that DB's *Internal Database URL* into DATABASE_URL in the
      # dashboard. DB_SCHEMA keeps this app's tables in their own schema so
      # they never collide with the other service's tables.
      - key: DATABASE_URL
        sync: false
      - key: DB_SCHEMA
        value: nepa_unite

      # --- CORS (set to your frontend origin if you have one) ---
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: ""

      # --- Redis (OPTIONAL) ---
      # Leave unset for a single-service deploy (locmem cache + eager tasks).
      # To enable, create a Render Key Value instance and set REDIS_URL here.
      # - key: REDIS_URL
      #   fromService:
      #     type: keyvalue
      #     name: nepa-unite-redis
      #     property: connectionString

      # --- Email (Gmail SMTP — fill these in the dashboard) ---
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false

      # --- Stripe (optional — fill in the dashboard if used) ---
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_GATE_ENABLED
        value: "False"
