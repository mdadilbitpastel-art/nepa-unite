services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nepa
      POSTGRES_PASSWORD: nepa
      POSTGRES_DB: nepa_unite
    ports:
      # Host port 5433 → container's 5432. Host's 5432 is held by a
      # native Windows PostgreSQL install on some dev machines; using
      # 5433 sidesteps the conflict. Django (in the `web` container)
      # still talks to `postgres:5432` over the Docker network — only
      # external tools like pgAdmin care about this mapping.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nepa -d nepa_unite"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python manage.py migrate --no-input &&
             gunicorn nepa_unite.wsgi:application --bind 0.0.0.0:8000 --workers 4 --reload"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: nepa_unite.settings.development
      DATABASE_URL: postgres://nepa:nepa@postgres:5432/nepa_unite
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A nepa_unite worker --loglevel=info
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: nepa_unite.settings.development
      DATABASE_URL: postgres://nepa:nepa@postgres:5432/nepa_unite
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
