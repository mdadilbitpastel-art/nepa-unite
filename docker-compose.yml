services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nepa
      POSTGRES_PASSWORD: nepa
      POSTGRES_DB: nepa_unite
    ports:
      # Host port 5433 → container's 5432. Host's 5432 is held by a
      # native Windows PostgreSQL install on some dev machines; using
      # 5433 sidesteps the conflict. Django (in the `web` container)
      # still talks to `postgres:5432` over the Docker network — only
      # external tools like pgAdmin care about this mapping.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nepa -d nepa_unite"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    # Dev server: Django's runserver auto-reloads on .py AND template changes.
    # Its reloader uses mtime polling (StatReloader), which works on the WSL2
    # /mnt/c bind mount where inotify file events don't fire — so you no longer
    # need to `docker compose restart web` to see changes. For prod-like runs,
    # swap back to the gunicorn command.
    command: >
      sh -c "python manage.py migrate --no-input &&
             python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: nepa_unite.settings.development
      DATABASE_URL: postgres://nepa:nepa@postgres:5432/nepa_unite
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    # `--beat` embeds the periodic scheduler in this single dev worker so
    # scheduled jobs (e.g. auto-closing delivered orders once their return/
    # exchange window elapses) actually fire. The schedule DB is written to
    # /tmp so it never lands in the mounted source tree. For a multi-worker
    # prod deploy, run `celery -A nepa_unite beat` as its own process instead.
    command: celery -A nepa_unite worker --beat -s /tmp/celerybeat-schedule --loglevel=info
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: nepa_unite.settings.development
      DATABASE_URL: postgres://nepa:nepa@postgres:5432/nepa_unite
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
